<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DRS Control Tower — Operational Command Center v48</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"
        integrity="sha384-e6nUZLBkQ86NJ6TVVKAeSaK8jWa3NhkYWZFomE39AvDbQWeie9PlQqM3pmYW5d1g"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"
        integrity="sha384-NElt3Op+9NBMCYaef5HxeJmU4Xeard/Lku8ek6hoPTvYkQPh3zLIrJP7KiRocsxO"
        crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
      integrity="sha384-c6Rcwz4e4CITMbu/NBmnNS8yN2sC3cUElMEMfP3vqqKFp7GOYaaBBCqmaWBjmkjb"
      crossorigin="anonymous"/>
<link rel="stylesheet" href="app.css">
</head>
<body>

<div class="app">
  <!-- ============================================================
       SIDEBAR
       ============================================================ -->
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-brand-title">
        <span class="sb-brand-logo">DRS</span>
        Control Tower
      </div>
    </div>

    <div class="sb-search">
      <input type="text" placeholder="Quick jump… (Ctrl K)" />
    </div>

    <nav class="sb-scroll" id="sidebar-nav"></nav>

    <div class="sb-footer">
      <div class="sb-avatar">AK</div>
      <div>
        <div class="sb-user-name">Ashwin Kumar</div>
        <div class="sb-user-role">Scheme Operator · Goa</div>
      </div>
    </div>
  </aside>

  <!-- ============================================================
       CONTENT
       ============================================================ -->
  <div class="content">
    <header class="topbar">
      <div class="breadcrumb">
        <span class="crumb-page" id="crumb-page">Executive Dashboard</span>
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-meta">
        <span class="pulse"><span class="pulse-dot"></span> Live · Updated just now</span>
        <button class="btn btn-primary" id="export-btn">Export Report</button>
        <button class="btn">Alerts <span class="btn-badge">7</span></button>
      </div>
    </header>

    <!-- Filter bar (per-module, populated by JS) -->
    <div class="filter-bar" id="filter-bar"></div>

    <main class="main" id="main-content"></main>
  </div>
</div>

<!-- ============================================================
     SIDE DRAWER — click-through detail panel
     ============================================================ -->
<div class="drawer-backdrop" id="drawer-backdrop"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <div>
      <div class="drawer-eyebrow" id="drawer-eyebrow">Detail</div>
      <div class="drawer-title" id="drawer-title">—</div>
    </div>
    <button class="drawer-close" id="drawer-close">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</aside>

<script src="app.js"></script>

</body>
</html>
