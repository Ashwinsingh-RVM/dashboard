<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DRS Control Tower — Operational Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  /* ============================================================
     DESIGN SYSTEM — Operational Command Center
     Dark sidebar · White data canvas · Data-dense · No charts
     ============================================================ */
  :root {
    /* Sidebar (dark) */
    --sb-bg: #0b0f17;
    --sb-bg-2: #131825;
    --sb-border: #1f2533;
    --sb-text: #e6e9ef;
    --sb-text-dim: #8891a3;
    --sb-text-mute: #5a6275;
    --sb-hover: #1a2030;
    --sb-active: #232b3e;

    /* Content */
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface-2: #fafbfc;
    --border: #e4e7ec;
    --border-strong: #d4d8e0;
    --row-hover: #f7f9fc;
    --row-stripe: #fafbfc;
    --text: #0d1220;
    --text-soft: #4a5060;
    --text-mute: #8089a0;

    /* Accent */
    --accent: #2c4cdc;
    --accent-soft: #eef1ff;
    --accent-dim: #5d72ff;

    /* Status */
    --good: #047857;
    --good-bg: #ecfdf5;
    --warn: #b45309;
    --warn-bg: #fffbeb;
    --bad: #b91c1c;
    --bad-bg: #fef2f2;
    --info: #1d4ed8;
    --info-bg: #eff6ff;
    --neutral: #4b5563;
    --neutral-bg: #f3f4f6;

    /* Typography */
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;

    /* Layout */
    --sb-width: 260px;
    --topbar-h: 56px;
    --filter-h: 52px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .app { display: grid; grid-template-columns: var(--sb-width) 1fr; height: 100vh; }

  /* ============================================================
     SIDEBAR
     ============================================================ */
  .sidebar {
    background: var(--sb-bg);
    color: var(--sb-text);
    border-right: 1px solid var(--sb-border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sb-brand {
    padding: 20px 20px 18px;
    border-bottom: 1px solid var(--sb-border);
  }
  .sb-brand-title {
    font-size: 18px; font-weight: 700; color: #fff;
    letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 11px;
  }
  .sb-brand-logo {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, #2c4cdc, #5d72ff);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    color: #fff;
  }
  .sb-brand-sub {
    margin-top: 6px;
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--sb-text-mute);
    font-weight: 500;
  }
  .sb-search {
    padding: 12px 14px;
    border-bottom: 1px solid var(--sb-border);
  }
  .sb-search input {
    width: 100%;
    background: var(--sb-bg-2);
    border: 1px solid var(--sb-border);
    color: var(--sb-text);
    padding: 7px 10px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    outline: none;
  }
  .sb-search input::placeholder { color: var(--sb-text-mute); }
  .sb-search input:focus { border-color: var(--accent-dim); }

  .sb-scroll {
    flex: 1; overflow-y: auto;
    padding: 10px 10px 24px;
  }
  .sb-scroll::-webkit-scrollbar { width: 6px; }
  .sb-scroll::-webkit-scrollbar-thumb { background: var(--sb-border); border-radius: 3px; }

  .sb-section { margin-bottom: 2px; }
  .sb-section-head {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px;
    border-radius: 7px;
    cursor: pointer;
    color: var(--sb-text);
    font-weight: 500;
    font-size: 13.5px;
    transition: background 0.12s ease;
    user-select: none;
  }
  .sb-section-head:hover { background: var(--sb-hover); }
  .sb-section-head.active { background: var(--sb-active); color: #fff; font-weight: 600; }
  .sb-section-icon {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .sb-section-label { flex: 1; }
  .sb-chevron {
    width: 11px; height: 11px;
    transition: transform 0.2s ease;
    opacity: 0.4;
  }
  .sb-section.open .sb-chevron { transform: rotate(90deg); }
  .sb-badge {
    background: var(--bad);
    color: #fff;
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--font-mono);
    min-width: 22px;
    text-align: center;
  }

  .sb-sub { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
  .sb-section.open .sb-sub { max-height: 900px; }

  .sb-sub-item {
    display: block;
    padding: 7px 12px 7px 37px;
    margin: 1px 0;
    border-radius: 5px;
    font-size: 12.5px;
    color: var(--sb-text-dim);
    cursor: pointer;
    text-decoration: none;
    transition: all 0.1s ease;
    position: relative;
  }
  .sb-sub-item:hover { background: var(--sb-hover); color: var(--sb-text); }
  .sb-sub-item.active {
    background: rgba(44, 76, 220, 0.15);
    color: #fff;
  }
  .sb-sub-item.active::before {
    content: '';
    position: absolute;
    left: 24px; top: 50%;
    width: 3px; height: 16px;
    transform: translateY(-50%);
    background: var(--accent-dim);
    border-radius: 2px;
  }
  .sb-sub-count {
    float: right;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--sb-text-mute);
    background: var(--sb-bg-2);
    padding: 1px 6px;
    border-radius: 3px;
  }
  .sb-sub-item.active .sb-sub-count { color: var(--sb-text); background: var(--sb-active); }

  .sb-sub-group { margin-top: 4px; }
  .sb-sub-group-title {
    padding: 8px 12px 4px 37px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--sb-text-mute);
    font-weight: 600;
  }
  .sb-sub-group .sb-sub-item { padding-left: 49px; }
  .sb-sub-group .sb-sub-item.active::before { left: 36px; }

  .sb-footer {
    border-top: 1px solid var(--sb-border);
    padding: 14px 18px;
    display: flex; align-items: center; gap: 11px;
  }
  .sb-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2c4cdc, #5d72ff);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 600; font-size: 12.5px;
    flex-shrink: 0;
  }
  .sb-user-name { font-size: 13px; color: var(--sb-text); font-weight: 600; line-height: 1.2; }
  .sb-user-role { font-size: 11.5px; color: var(--sb-text-mute); margin-top: 1px; }

  /* ============================================================
     CONTENT
     ============================================================ */
  .content { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

  /* Top bar */
  .topbar {
    height: 64px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 24px;
    gap: 16px;
    flex-shrink: 0;
  }
  .breadcrumb {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 17px;
  }
  .crumb-module {
    color: var(--text-mute);
    font-weight: 500;
  }
  .crumb-sep { color: var(--border-strong); }
  .crumb-page {
    color: var(--text);
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .topbar-spacer { flex: 1; }
  .topbar-meta {
    display: flex; align-items: center; gap: 14px;
    font-size: 12px; color: var(--text-soft);
  }
  .pulse {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 4px 10px;
    background: var(--good-bg);
    color: var(--good);
    border-radius: 12px;
    font-size: 11px; font-weight: 500;
  }
  .pulse-dot {
    width: 6px; height: 6px;
    background: var(--good);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    color: var(--text-soft);
    cursor: pointer;
    transition: all 0.12s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { border-color: var(--border-strong); color: var(--text); background: var(--surface-2); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #1f3bb8; border-color: #1f3bb8; color: #fff; }
  .btn-icon { padding: 6px 8px; }
  .btn-badge {
    background: var(--bad);
    color: #fff;
    border-radius: 9px;
    padding: 0 5px;
    font-size: 10px;
    font-weight: 600;
    min-width: 16px;
    text-align: center;
  }

  /* Hierarchy breadcrumb (state > district > ...) */
  .hier-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 11px 24px;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .hier-step {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 0;
    color: var(--text-soft);
    cursor: pointer;
    white-space: nowrap;
  }
  .hier-step:hover { color: var(--text); }
  .hier-step.current .hier-step-value { color: var(--text); font-weight: 600; }
  .hier-step-value { font-weight: 500; }
  .hier-sep { color: var(--border-strong); font-size: 14px; margin: 0 4px; }

  /* Filter bar */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 9px 20px;
    display: flex; align-items: center;
    gap: 6px; flex-wrap: wrap;
    flex-shrink: 0;
  }
  .filter-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 9px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 11.5px;
    color: var(--text-soft);
    cursor: pointer;
    transition: all 0.12s ease;
    white-space: nowrap;
  }
  .filter-chip:hover { border-color: var(--border-strong); }
  .filter-chip.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .filter-chip-label { font-weight: 500; color: var(--text-mute); font-size: 10.5px; }
  .filter-chip.active .filter-chip-label { color: var(--accent); }
  .filter-chip-value { color: var(--text); font-weight: 500; }
  .filter-chip.active .filter-chip-value { color: var(--accent); }
  .filter-spacer { flex: 1; }
  .filter-reset {
    font-size: 11.5px; color: var(--text-mute);
    background: none; border: none; cursor: pointer; padding: 3px 8px;
    font-family: inherit;
  }
  .filter-reset:hover { color: var(--accent); }
  .filter-chip-caret {
    color: var(--text-mute);
    font-size: 9px;
    margin-left: 2px;
  }
  .filter-chip.active .filter-chip-caret { color: var(--accent); }
  .filter-dd { cursor: pointer; user-select: none; }

  .filter-menu-item {
    padding: 7px 12px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    border-radius: 4px;
    white-space: nowrap;
  }
  .filter-menu-item:hover { background: var(--accent-soft); color: var(--accent); }

  /* Main scroll */
  .main {
    flex: 1; overflow-y: auto;
    padding: 18px 20px 60px;
  }

  /* ============================================================
     PAGE PRIMITIVES
     ============================================================ */
  .page { display: none; }
  .page.active { display: block; }

  .section-head {
    margin-bottom: 12px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .section-title {
    font-size: 11.5px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-mute);
  }
  .section-sub { font-size: 11.5px; color: var(--text-mute); }

  /* KPI grid — no charts, dense */
  .kgrid { display: grid; gap: 8px; margin-bottom: 22px; }
  .kgrid-2 { grid-template-columns: repeat(2, 1fr); }
  .kgrid-3 { grid-template-columns: repeat(3, 1fr); }
  .kgrid-4 { grid-template-columns: repeat(4, 1fr); }
  .kgrid-5 { grid-template-columns: repeat(5, 1fr); }
  .kgrid-6 { grid-template-columns: repeat(6, 1fr); }
  @media (max-width: 1400px) { .kgrid-6 { grid-template-columns: repeat(4, 1fr); } .kgrid-5 { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 1100px) { .kgrid-4 { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 900px)  { .kgrid-3, .kgrid-4 { grid-template-columns: repeat(2, 1fr); } }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    position: relative;
    transition: all 0.12s ease;
    cursor: pointer;
  }
  .kpi:hover { border-color: var(--accent-dim); }
  .kpi-label {
    font-size: 10.5px;
    color: var(--text-mute);
    font-weight: 500;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .kpi-value {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 600;
    line-height: 1.1;
    color: var(--text);
    letter-spacing: -0.02em;
    display: flex; align-items: baseline; gap: 4px;
  }
  .kpi-unit {
    font-family: var(--font-sans);
    font-size: 12px;
    color: var(--text-mute);
    font-weight: 500;
  }
  .kpi-foot {
    margin-top: 6px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 10.5px;
    color: var(--text-mute);
  }
  .kpi-delta {
    font-family: var(--font-mono);
    font-weight: 500;
  }
  .kpi-delta.up { color: var(--good); }
  .kpi-delta.down { color: var(--bad); }
  .kpi-delta.flat { color: var(--text-mute); }

  .kpi.alert { border-left: 3px solid var(--bad); }
  .kpi.warn { border-left: 3px solid var(--warn); }
  .kpi.good { border-left: 3px solid var(--good); }

  /* Card panel */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .card-head {
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .card-sub { font-size: 11px; color: var(--text-mute); margin-top: 1px; }
  .card-actions { display: flex; gap: 6px; align-items: center; }
  .card-body { padding: 14px 16px; }
  .card-body.flush { padding: 0; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table.t {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  table.t thead th {
    position: sticky; top: 0; z-index: 1;
    text-align: left;
    padding: 9px 12px;
    background: var(--surface-2);
    color: var(--text-mute);
    font-weight: 600;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  table.t thead th:hover { color: var(--text); }
  table.t thead th.sort-asc::after { content: ' ↑'; color: var(--accent); }
  table.t thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }
  table.t tbody td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    white-space: nowrap;
  }
  table.t tbody tr:hover td { background: var(--row-hover); }
  table.t tbody tr.striped td { background: var(--row-stripe); }
  table.t tbody tr.striped:hover td { background: var(--row-hover); }
  table.t tbody tr:last-child td { border-bottom: none; }
  table.t .num { font-family: var(--font-mono); text-align: right; font-weight: 500; }
  table.t .num-cell { font-family: var(--font-mono); font-weight: 500; }
  table.t .row-action { color: var(--accent); cursor: pointer; font-weight: 500; }
  table.t .row-action:hover { text-decoration: underline; }
  table.t .id-cell { font-family: var(--font-mono); font-size: 11px; color: var(--text-mute); }

  /* Status pills */
  .pill {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    font-family: var(--font-sans);
  }
  .pill-good { background: var(--good-bg); color: var(--good); }
  .pill-warn { background: var(--warn-bg); color: var(--warn); }
  .pill-bad { background: var(--bad-bg); color: var(--bad); }
  .pill-info { background: var(--info-bg); color: var(--info); }
  .pill-neutral { background: var(--neutral-bg); color: var(--neutral); }

  .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }
  .dot-good { background: var(--good); }
  .dot-warn { background: var(--warn); }
  .dot-bad { background: var(--bad); }
  .dot-neutral { background: var(--neutral); }

  /* Toolbar (search + actions above table) */
  .toolbar {
    padding: 10px 14px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .toolbar-search {
    position: relative;
    flex: 1; max-width: 320px;
  }
  .toolbar-search input {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 6px 10px 6px 28px;
    border-radius: 5px;
    font-family: inherit;
    font-size: 12px;
    outline: none;
  }
  .toolbar-search input:focus { border-color: var(--accent); }
  .toolbar-search-icon {
    position: absolute; left: 9px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-mute);
    pointer-events: none;
  }
  .toolbar-sep { width: 1px; height: 20px; background: var(--border); }
  .toolbar-count {
    margin-left: auto;
    font-size: 11.5px;
    color: var(--text-mute);
  }
  .toolbar-count strong { color: var(--text); font-family: var(--font-mono); font-weight: 600; }

  /* Pagination */
  .pager {
    padding: 10px 16px;
    background: var(--surface-2);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11.5px; color: var(--text-mute);
  }
  .pager-controls { display: flex; gap: 4px; align-items: center; }
  .pg-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 4px 9px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-soft);
    cursor: pointer;
  }
  .pg-btn:hover:not(:disabled) { border-color: var(--border-strong); color: var(--text); }
  .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .pg-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pg-info { font-family: var(--font-mono); color: var(--text); }

  /* Expandable row */
  .expand-row {
    background: var(--surface-2) !important;
  }
  .expand-row td {
    padding: 14px 18px !important;
    background: var(--surface-2) !important;
    white-space: normal !important;
  }
  .expand-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .expand-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
  }
  .expand-item-label {
    font-size: 10px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .expand-item-value {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }

  /* CP Detail page */
  .detail-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 18px;
  }
  .detail-back {
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 11.5px;
    color: var(--text-soft);
    font-family: inherit;
  }
  .detail-back:hover { background: var(--bg); }
  .detail-id {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mute);
    margin-bottom: 2px;
  }
  .detail-name {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .detail-meta {
    margin-top: 4px;
    display: flex; gap: 14px;
    font-size: 11.5px;
    color: var(--text-mute);
  }
  .detail-meta strong { color: var(--text-soft); font-weight: 500; }
  .detail-actions { margin-left: auto; display: flex; gap: 8px; }
  .detail-status-bar {
    display: flex; gap: 16px;
    margin-left: 24px;
    padding-left: 24px;
    border-left: 1px solid var(--border);
  }
  .detail-status-item { text-align: center; }
  .detail-status-value { font-family: var(--font-mono); font-size: 18px; font-weight: 600; color: var(--text); }
  .detail-status-label { font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

  .detail-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .detail-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

  /* Definition list — used in detail panels */
  .dl {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .dl-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .dl-row:last-child { border-bottom: none; }
  .dl-label { color: var(--text-mute); font-weight: 500; font-size: 11.5px; }
  .dl-value { color: var(--text); font-family: var(--font-mono); font-weight: 500; }
  .dl-value.txt { font-family: var(--font-sans); }

  /* Stub */
  .stub {
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    border-radius: 8px;
    padding: 50px 30px;
    text-align: center;
    color: var(--text-mute);
  }
  .stub-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .stub-text { font-size: 12.5px; max-width: 520px; margin: 0 auto; line-height: 1.6; }
  .stub-kpis { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .stub-kpi { padding: 4px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 100px; font-size: 11px; color: var(--text-soft); font-family: var(--font-mono); }

  /* ============================================================
     SIDE DRAWER
     ============================================================ */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(13, 18, 32, 0.4);
    backdrop-filter: blur(2px);
    z-index: 998;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s ease;
  }
  .drawer-backdrop.open { opacity: 1; visibility: visible; }
  .drawer {
    position: fixed; top: 0; right: 0;
    width: 560px;
    max-width: 92vw;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    box-shadow: -8px 0 32px rgba(13, 18, 32, 0.08);
    z-index: 999;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.32, 0.72, 0.2, 1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
    flex-shrink: 0;
  }
  .drawer-eyebrow {
    font-size: 10.5px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .drawer-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1.25;
  }
  .drawer-close {
    margin-left: auto;
    background: none;
    border: none;
    font-size: 18px;
    color: var(--text-mute);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 5px;
    font-family: inherit;
  }
  .drawer-close:hover { background: var(--bg); color: var(--text); }
  .drawer-body {
    flex: 1; overflow-y: auto;
    padding: 18px 20px 40px;
  }
  .dr-section {
    margin-bottom: 22px;
  }
  .dr-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-mute);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .dr-kpis {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .dr-kpi {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
  }
  .dr-kpi-lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-mute);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .dr-kpi-val {
    font-family: var(--font-mono);
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }
  .dr-row {
    display: grid;
    grid-template-columns: 130px 1fr;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12.5px;
  }
  .dr-row:last-child { border-bottom: none; }
  .dr-row-label { color: var(--text-mute); font-weight: 500; font-size: 11.5px; }
  .dr-row-value { color: var(--text); font-family: var(--font-mono); font-weight: 500; }
  .dr-row-value.txt { font-family: var(--font-sans); }
  .dr-action-bar {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px;
  }
  .clickable {
    cursor: pointer;
    transition: background 0.1s;
  }
  .clickable:hover { background: var(--row-hover); }

  /* Bag flow chain visualization */
  .bag-chain {
    display: flex; align-items: stretch;
    gap: 0;
    margin-bottom: 14px;
  }
  .bag-chain-node {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    position: relative;
  }
  .bag-chain-node.active {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .bag-chain-node-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-mute);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .bag-chain-node-val {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .bag-chain-node-sub {
    font-size: 11px;
    color: var(--text-mute);
  }
  .bag-chain-arrow {
    align-self: center;
    width: 28px;
    text-align: center;
    color: var(--border-strong);
    font-size: 18px;
    flex-shrink: 0;
  }

  /* Executive Dashboard — hero KPIs */
  .hero-grid { margin-bottom: 26px; }
  .hero-kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    transition: all 0.15s ease;
  }
  .hero-kpi:hover { border-color: var(--border-strong); box-shadow: 0 2px 8px rgba(13,18,32,0.04); }
  .hero-kpi.alert { border-left: 4px solid var(--bad); }
  .hero-kpi-label {
    font-size: 11.5px;
    color: var(--text-mute);
    font-weight: 500;
    margin-bottom: 10px;
    letter-spacing: 0.01em;
  }
  .hero-kpi-value {
    font-family: var(--font-mono);
    font-size: 30px;
    font-weight: 600;
    line-height: 1.05;
    color: var(--text);
    letter-spacing: -0.02em;
    display: flex; align-items: baseline; gap: 6px;
  }
  .hero-kpi-unit {
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--text-mute);
    font-weight: 500;
  }
  .hero-kpi-foot {
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-mute);
  }

  /* Module snapshot cards */
  .mod-grid { margin-bottom: 26px; }
  .mod-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .mod-card:hover {
    border-color: var(--accent-dim);
    box-shadow: 0 2px 12px rgba(44,76,220,0.06);
    transform: translateY(-1px);
  }
  .mod-head {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }
  .mod-icon {
    width: 38px; height: 38px;
    border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .mod-meta { flex: 1; min-width: 0; }
  .mod-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .mod-sub { font-size: 11.5px; color: var(--text-mute); margin-top: 2px; }
  .mod-status { flex-shrink: 0; }
  .mod-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
    gap: 1px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .mod-stat {
    background: var(--surface-2);
    padding: 9px 8px;
    text-align: center;
    min-width: 0;
  }
  .mod-stat-label {
    font-size: 10px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 3px;
    font-weight: 500;
  }
  .mod-stat-val {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  /* Alert / SLA strip — appears at top of every module page */
  .alert-strip {
    display: grid;
    grid-template-columns: minmax(380px, 480px) 1fr;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 18px;
    overflow: hidden;
  }
  .alert-strip-kpis {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    background: var(--surface-2);
    border-right: 1px solid var(--border);
  }
  .asl-kpi {
    padding: 12px 10px;
    text-align: center;
    border-right: 1px solid var(--border);
    transition: background 0.12s;
  }
  .asl-kpi:last-child { border-right: none; }
  .asl-kpi.alert .asl-kpi-val { color: var(--bad); }
  .asl-kpi.warn .asl-kpi-val { color: var(--warn); }
  .asl-kpi-val {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.05;
  }
  .asl-kpi-lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-mute);
    margin-top: 4px;
    font-weight: 500;
  }
  .alert-strip-feed {
    padding: 8px 14px;
  }
  .alert-strip-feed-head {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-mute);
    padding: 4px 0 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .alert-strip-row {
    display: grid;
    grid-template-columns: 50px auto 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 5px 0;
    font-size: 11.5px;
    border-bottom: 1px solid var(--border);
  }
  .alert-strip-row:last-child { border-bottom: none; }
  .alert-strip-time {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-mute);
  }
  .alert-strip-msg { color: var(--text); font-weight: 500; }
  .alert-strip-loc { color: var(--text-mute); font-size: 11px; }
  .alert-strip-age { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-mute); }
  .alert-strip-empty { padding: 14px; text-align: center; color: var(--text-mute); font-size: 12px; }

  /* CPC Network cards */
  .cpc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 22px;
  }
  .cpc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .cpc-card:hover { border-color: var(--accent-dim); }
  .cpc-card-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .cpc-card-id { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-mute); letter-spacing: 0.05em; }
  .cpc-card-cluster { font-size: 10.5px; padding: 2px 7px; background: var(--accent-soft); color: var(--accent); border-radius: 4px; font-weight: 500; }
  .cpc-card-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .cpc-card-cap {
    font-size: 11px; color: var(--text-mute);
    margin-bottom: 4px;
    display: flex; justify-content: space-between;
  }
  .cpc-card-cap strong { color: var(--text); font-family: var(--font-mono); }
  .cpc-bar {
    height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden;
    margin-bottom: 10px;
  }
  .cpc-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }
  .cpc-card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-radius: 5px;
    overflow: hidden;
    margin-top: 10px;
  }
  .cpc-card-stat { background: var(--surface-2); padding: 7px 8px; text-align: center; }
  .cpc-card-stat-lbl { font-size: 9px; text-transform: uppercase; color: var(--text-mute); letter-spacing: 0.05em; }
  .cpc-card-stat-val { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--text); margin-top: 2px; }

  /* Material stage pipeline */
  .stage-pipeline {
    display: flex; align-items: stretch; gap: 4px;
    padding: 10px 12px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }
  .stage-step {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    text-align: center;
    position: relative;
  }
  .stage-step-val { font-family: var(--font-mono); font-size: 16px; font-weight: 600; color: var(--text); }
  .stage-step-unit { font-size: 10.5px; color: var(--text-mute); margin-left: 2px; }
  .stage-step-lbl { font-size: 10.5px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 3px; }
  .stage-arrow { color: var(--border-strong); align-self: center; font-size: 14px; }

  /* ============================================================
     EXECUTIVE DASHBOARD v14 — Screenshot-aligned premium styles
     ============================================================ */
  .exec-quickbar {
    display: flex; align-items: center; gap: 14px;
    padding: 11px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .exec-quickbar-label {
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text-mute);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .exec-quickbar-tabs {
    display: flex; gap: 18px;
    flex: 1; min-width: 0;
  }
  .exec-qtab {
    font-size: 13px;
    color: var(--text-mute);
    cursor: pointer;
    padding: 4px 0;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .exec-qtab:hover { color: var(--text); }
  .exec-qtab.active {
    color: #2c4cdc;
    border-bottom-color: #2c4cdc;
    font-weight: 600;
  }
  .exec-quickbar-apply {
    background: #2c4cdc;
    color: white;
    border: none;
    padding: 7px 18px;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .exec-quickbar-apply:hover { background: #1e3bb8; transform: translateY(-1px); }

  .exec-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 18px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(13,18,32,0.04);
  }
  .exec-card-head {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 20px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .exec-card-head:hover { background: #fafbfc; }
  .exec-card-icon {
    font-size: 16px;
    color: #2c4cdc;
    width: 22px;
    flex-shrink: 0;
  }
  .exec-card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .exec-card-collapse {
    font-size: 11.5px;
    color: var(--text-mute);
    user-select: none;
  }
  .exec-card-body {
    padding: 0 20px 20px;
  }
  .exec-card.collapsed .exec-card-body { display: none; }

  .exec-kpi-row {
    display: grid;
    gap: 10px;
  }
  .exec-kpi-row-3 { grid-template-columns: repeat(3, 1fr); }
  .exec-kpi-row-2 { grid-template-columns: repeat(2, 1fr); }
  .exec-kpi-row-4 { grid-template-columns: repeat(4, 1fr); }
  .exec-kpi-row-5 { grid-template-columns: repeat(5, 1fr); }
  .exec-kpi-row-6 { grid-template-columns: repeat(6, 1fr); }
  @media (max-width: 1280px) {
    .exec-kpi-row-6, .exec-kpi-row-5 { grid-template-columns: repeat(3, 1fr); }
    .exec-kpi-row-4 { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 720px) {
    .exec-kpi-row-6, .exec-kpi-row-5, .exec-kpi-row-4, .exec-kpi-row-3, .exec-kpi-row-2 { grid-template-columns: repeat(2, 1fr); }
  }

  /* ============================================================
     Collection Points — 3-column category layout
     ============================================================ */
  .exec-cp-3col {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }
  @media (max-width: 1100px) { .exec-cp-3col { grid-template-columns: 1fr; } }
  .exec-cp-cat-col {
    background: #f8fafc;
    border: 1px solid #e6e8ec;
    border-radius: 10px;
    padding: 16px 16px 14px;
    transition: all 0.15s;
  }
  .exec-cp-cat-col:hover { box-shadow: 0 4px 14px rgba(13,18,32,0.06); }
  .exec-cp-cat-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .exec-cp-cat-icon {
    width: 38px; height: 38px;
    border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .exec-cp-cat-name {
    font-size: 13.5px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.15;
  }
  .exec-cp-cat-sub {
    font-size: 11px;
    color: var(--text-mute);
    margin-top: 2px;
  }
  .exec-cp-cat-total {
    font-family: var(--font-mono);
    font-size: 34px;
    font-weight: 700;
    color: #1e293b;
    line-height: 1;
    margin-bottom: 14px;
    letter-spacing: -0.02em;
  }
  .exec-cp-cat-rows {
    display: flex; flex-direction: column; gap: 6px;
    padding-top: 10px;
    border-top: 1px solid #e6e8ec;
  }
  .exec-cp-cat-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 10px;
    background: var(--surface);
    border-radius: 6px;
    font-size: 12.5px;
  }
  .exec-cp-cat-row-name {
    color: var(--text);
    font-weight: 500;
  }
  .exec-cp-cat-row-val {
    font-family: var(--font-mono);
    font-weight: 700;
    color: #1e293b;
    font-size: 14px;
  }

  /* CP payments strip at bottom */
  .exec-cp-payments-strip {

      status: status,
    });
  }
  return out;

// Re-classification — determines HF eligibility + double-count requirement
// non-Re CPs (not Retearn/Recykal-owned) → HF=Yes, DC=Yes
// Re-Large / Re-Small → HF=No, DC=No
// HoReCa establishments (bulk pickup) → HF=No, DC=No regardless of Re classification
const RE_TYPES = ['Re-Large', 'Re-Small', 'non-Re'];

const ESTABLISHMENT_FROM_CP_TYPE = {
  'RVM':           'Retail',
  'Return Center': 'Retail',
  'D2D':           'Retail',
  'HoReCa':        'HoReCa',
  'Non-Recykal':   'Liquor',
};

// Decorate each CP with HF/DC flags + bag states (sealed/active/empty)
// without breaking any existing fields
(function decorateCps() {
  for (let i = 0; i < CP_DATA.length; i++) {
    const cp = CP_DATA[i];
    // Deterministic reType from index hash (stable across renders)
    const h = (cp.id.charCodeAt(2) + cp.id.charCodeAt(3) + i * 13) % 100;
    cp.reType = h < 30 ? 'Re-Large' : h < 65 ? 'Re-Small' : 'non-Re';
    cp.establishmentType = ESTABLISHMENT_FROM_CP_TYPE[cp.type] || 'Retail';
    cp.hfEligible          = cp.reType === 'non-Re' && cp.establishmentType !== 'HoReCa';
    cp.doubleCountRequired = cp.reType === 'non-Re' && cp.establishmentType !== 'HoReCa';
    // Bag states — sealed/active/empty
    const sealed = cp.status === 'Down' ? 0 : (((h * 7) % 100) < 35 ? ((h * 3) % 5) + 1 : 0);
    cp.sealedBags = sealed;
    cp.activeBags = cp.status === 'Down' ? 0 : ((h * 11) % 3);
    cp.emptyBags = cp.bagInventory;
    cp.bagLow = cp.emptyBags < 6;
    // Longest sealed-bag wait time (hours)
    cp.longestWaitH = sealed > 0 ? (((h * 5) % 38) + 1) : 0;
    cp.slaBreachedSeal = sealed > 0 && cp.longestWaitH > 4;
    // Trip assignment — deterministic
    cp.hasTrip = sealed > 0 ? (((h * 17) % 100) < 70) : false;
  }
})();

function alertSlaStrip(moduleId) {
  const data = MODULE_ALERT_DATA[moduleId];

  const sevPill = (s) => ({
    'Critical': '<span class="pill pill-bad">Critical</span>',
    'High':     '<span class="pill pill-warn">High</span>',
    'Medium':   '<span class="pill pill-info">Medium</span>',
    'Low':      '<span class="pill pill-neutral">Low</span>',
  })[s];
  const items = data.items || [];
  return `
    <div class="alert-strip">
      <div class="alert-strip-kpis">
        <div class="asl-kpi ${data.active > 0 ? 'alert' : ''}">
          <div class="asl-kpi-val">${data.active}</div>
          <div class="asl-kpi-lbl">Active Alerts</div>
        </div>
        <div class="asl-kpi ${data.breached > 0 ? 'alert' : ''}">
          <div class="asl-kpi-val">${data.breached}</div>
          <div class="asl-kpi-lbl">SLA Breached</div>
        </div>
        <div class="asl-kpi ${data.atRisk > 5 ? 'warn' : ''}">
          <div class="asl-kpi-val">${data.atRisk}</div>
          <div class="asl-kpi-lbl">At Risk</div>
        </div>
        <div class="asl-kpi">
          <div class="asl-kpi-val">${data.resolved}</div>
          <div class="asl-kpi-lbl">Resolved (24h)</div>
        </div>
      </div>
      <div class="alert-strip-feed">
        <div class="alert-strip-feed-head">
          <span>Recent Breaches</span>
          <span class="row-action" data-jump-alerts="1">View all →</span>
        </div>
        ${items.length > 0 ? items.slice(0, 3).map(a => `
          <div class="alert-strip-row">
            <span class="alert-strip-time">${a.time}</span>
            ${sevPill(a.sev)}
            <span class="alert-strip-msg">${a.msg}</span>
            <span class="alert-strip-loc">${a.loc}</span>
            <span class="alert-strip-age">${a.age}</span>
          </div>
        `).join('') : '<div class="alert-strip-empty">No active breaches</div>'}
      </div>
    </div>
  `;

/* ============================================================
   RENDER SIDEBAR
   ============================================================ */
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = NAV.map(section => `
    <div class="sb-section ${section.id === 'exec' ? 'open' : ''}" data-section="${section.id}">
      <div class="sb-section-head ${section.id === 'exec' ? 'active' : ''}">
        <span class="sb-section-icon">${section.icon}</span>
        <span class="sb-section-label">${section.label}</span>
        ${section.badge ? `<span class="sb-badge">${section.badge}</span>` : ''}
        ${section.children.length > 1 || (section.children[0] && section.children[0].isGroup) ? `
        <svg class="sb-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>` : ''}
      </div>
      <div class="sb-sub">
        ${section.children.map(c => {
          if (c.isGroup) {
            return `
              <div class="sb-sub-group">
                <div class="sb-sub-group-title">${c.label}</div>
                ${c.items.map(i => `<a class="sb-sub-item" data-page="${i.id}" data-module="${section.id}" data-label="${c.label} · ${i.label}">${i.label}</a>`).join('')}
              </div>`;
          }
          const countHtml = c.count ? `<span class="sb-sub-count">${c.count}</span>` : '';
          return `<a class="sb-sub-item ${c.id === 'exec-home' ? 'active' : ''}" data-page="${c.id}" data-module="${section.id}" data-label="${c.label}">${c.label}${countHtml}</a>`;
        }).join('')}
      </div>
    </div>
  `).join('');

  // Single-child modules: clicking the section head navigates directly
  nav.querySelectorAll('.sb-section').forEach(section => {
    const id = section.dataset.section;
    const nav_section = NAV.find(s => s.id === id);
    const hasGroups = nav_section.children.some(c => c.isGroup);
    const isSingleChild = nav_section.children.length === 1 && !hasGroups;

    section.querySelector('.sb-section-head').addEventListener('click', () => {
      if (isSingleChild) {
        // Direct navigate, no expansion
        const child = nav_section.children[0];
        nav.querySelectorAll('.sb-sub-item').forEach(i => i.classList.remove('active'));
        nav.querySelectorAll('.sb-section-head').forEach(h => h.classList.remove('active'));
        section.querySelector('.sb-section-head').classList.add('active');
        nav.querySelectorAll('.sb-section').forEach(s => s.classList.remove('open'));
        navigateTo(child.id, id, child.label);
      } else {
        // Expand/collapse
        nav.querySelectorAll('.sb-section').forEach(s => { if (s !== section) s.classList.remove('open'); });
        section.classList.toggle('open');
      }
    });
  });

  nav.querySelectorAll('.sb-sub-item').forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      nav.querySelectorAll('.sb-sub-item').forEach(i => i.classList.remove('active'));
      nav.querySelectorAll('.sb-section-head').forEach(h => h.classList.remove('active'));
      item.classList.add('active');
      const moduleId = item.dataset.module;
      const section = nav.querySelector(`[data-section="${moduleId}"]`);
      section.querySelector('.sb-section-head').classList.add('active');
      navigateTo(item.dataset.page, moduleId, item.dataset.label);
    });
  });
}

/* ============================================================
   ROUTING
   ============================================================ */
function navigateTo(pageId, moduleId, label) {
  const moduleLabel = MODULE_LABEL[moduleId] || '';
  // For executive dashboard, just show page label. Otherwise show "Module · Page".
  const crumb = moduleId === 'exec' ? moduleLabel : `${moduleLabel} · ${label}`;
  document.getElementById('crumb-page').textContent = crumb;
  renderFilterBar(moduleId);
  renderPage(pageId);
  document.getElementById('main-content').scrollTop = 0;
}

/* ============================================================
   COMMON HELPERS
   ============================================================ */
function kpi(label, value, unit = '', opts = {}) {
  const { delta = null, sub = '', status = '' } = opts;
  const deltaHtml = delta !== null
    ? `<span class="kpi-delta ${delta > 0 ? 'up' : delta < 0 ? 'down' : 'flat'}">${delta > 0 ? '▲' : delta < 0 ? '▼' : '◆'} ${Math.abs(delta)}%</span>`
    : '';
  return `
    <div class="kpi ${status}">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value">${value}<span class="kpi-unit">${unit}</span></div>
      <div class="kpi-foot">
        <span>${sub || '&nbsp;'}</span>
        ${deltaHtml}
      </div>
    </div>
  `;
}

function statusPill(s) {
  const map = {
    'Active':      ['pill-good',    'dot-good'],
    'Inactive':    ['pill-neutral', 'dot-neutral'],
    'Maintenance': ['pill-warn',    'dot-warn'],
    'Down':        ['pill-bad',     'dot-bad'],
  };
  const [pc, dc] = map[s] || map['Inactive'];
  return `<span class="pill ${pc}"><span class="dot ${dc}"></span>${s}</span>`;
}

function renderCpTable() {
  // Filter
  let rows = CP_DATA.slice();
  const s = masterState.search.toLowerCase();
  if (s) {
    rows = rows.filter(r =>
      r.id.toLowerCase().includes(s) ||
      r.name.toLowerCase().includes(s) ||
      r.handler.toLowerCase().includes(s) ||
      r.panchayat.toLowerCase().includes(s) ||
      r.vendor.toLowerCase().includes(s)
    );
  }
  if (masterState.filterType !== 'All' && masterState.filterType !== 'All Types') rows = rows.filter(r => r.type === masterState.filterType);
  if (masterState.filterBlock !== 'All' && masterState.filterBlock !== 'All Blocks') rows = rows.filter(r => r.block === masterState.filterBlock);
  if (masterState.filterVendor !== 'All' && masterState.filterVendor !== 'All Vendors') rows = rows.filter(r => r.vendor === masterState.filterVendor);
  if (masterState.filterStatus !== 'All' && masterState.filterStatus !== 'All Status') rows = rows.filter(r => r.status === masterState.filterStatus);
  if (masterState.filterReType !== 'All' && masterState.filterReType !== 'All Re Types') rows = rows.filter(r => r.reType === masterState.filterReType);
  if (masterState.filterAction !== 'All' && masterState.filterAction !== 'All CPs') {
    if (masterState.filterAction === 'Needs Trip') rows = rows.filter(r => r.sealedBags > 0 && !r.hasTrip);
    else if (masterState.filterAction === 'SLA Breach') rows = rows.filter(r => r.slaBreachedSeal);
    else if (masterState.filterAction === 'Bags Low') rows = rows.filter(r => r.bagLow);
    else if (masterState.filterAction === 'Machines Down') rows = rows.filter(r => r.downMachines > 0);
  }

  // Sort
  rows.sort((a, b) => {
    const k = masterState.sortKey;
    const av = a[k], bv = b[k];
    if (typeof av === 'number') return masterState.sortDir === 'asc' ? av - bv : bv - av;
    return masterState.sortDir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });

  const total = rows.length;
  document.getElementById('cp-shown').textContent = total;

  // Paginate
  const pageSize = masterState.pageSize;
  const pages = Math.max(1, Math.ceil(total / pageSize));
  if (masterState.page > pages) masterState.page = pages;
  const start = (masterState.page - 1) * pageSize;
  const pageRows = rows.slice(start, start + pageSize);

  // Render header sort indicators
  document.querySelectorAll('#cp-table thead th[data-sort]').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.sort === masterState.sortKey) th.classList.add(masterState.sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
  });

  // Render body
  const tbody = document.getElementById('cp-tbody');
  tbody.innerHTML = pageRows.map((r, i) => `
    <tr class="${i % 2 ? 'striped' : ''}" data-cp="${r.id}">
      <td><span class="row-action expand-toggle" data-cp="${r.id}">${masterState.expanded.has(r.id) ? '▾' : '▸'}</span></td>
      <td class="id-cell">${r.id}</td>
      <td><span class="row-action open-detail" data-cp="${r.id}">${r.name}</span></td>
      <td><span class="pill pill-info">${r.type}</span></td>
      <td>${r.block}</td>
      <td>${r.panchayat}</td>
      <td>${r.vendor}</td>
      <td>${r.handler}</td>
      <td><span class="pill ${r.reType==='non-Re'?'pill-warn':'pill-neutral'}" style="font-size:10.5px;">${r.reType}</span></td>
      <td class="num">${r.hfEligible ? '<span style="color:var(--good);font-weight:700;">✓</span>' : '<span style="color:var(--text-mute);">—</span>'}</td>
      <td class="num">${r.doubleCountRequired ? '<span style="color:var(--accent);font-weight:700;">✓</span>' : '<span style="color:var(--text-mute);">—</span>'}</td>
      <td class="num">${r.machineCount}</td>
      <td class="num">${r.activeMachines}</td>
      <td class="num" style="${r.downMachines > 0 ? 'color: var(--bad); font-weight: 600;' : ''}">${r.downMachines}</td>
      <td class="num" style="${r.sealedBags>0?(r.slaBreachedSeal?'color:var(--bad);font-weight:700;':'color:var(--warn);font-weight:600;'):''}">${r.sealedBags||'—'}</td>
      <td class="num" style="${r.slaBreachedSeal?'color:var(--bad);font-weight:700;':r.longestWaitH>0?'color:var(--warn);':''}">${r.longestWaitH>0?r.longestWaitH+'h':'—'}</td>
      <td class="num">${r.dailyCollection.toLocaleString()}</td>
      <td class="num">${r.dailyTxn}</td>
      <td class="num" style="${r.uptime < 80 ? 'color: var(--bad)' : r.uptime < 95 ? 'color: var(--warn)' : 'color: var(--good)'};">${r.uptime}%</td>
      <td class="num">${r.bagInventory}</td>
      <td class="num">${r.escalations > 0 ? `<span style="color: var(--warn); font-weight: 600;">${r.escalations}</span>` : 0}</td>
      <td style="color: var(--text-mute); font-family: var(--font-mono); font-size: 11px;">${r.lastActive}</td>
      <td>${statusPill(r.status)}</td>
      <td><span class="row-action open-detail" data-cp="${r.id}">Open →</span></td>
    </tr>
    ${masterState.expanded.has(r.id) ? `
      <tr class="expand-row"><td colspan="25">
        <div class="expand-grid">
          <div class="expand-item"><div class="expand-item-label">Latitude</div><div class="expand-item-value">${r.lat}</div></div>
          <div class="expand-item"><div class="expand-item-label">Longitude</div><div class="expand-item-value">${r.lng}</div></div>
          <div class="expand-item"><div class="expand-item-label">Village</div><div class="expand-item-value">${r.village}</div></div>
          <div class="expand-item"><div class="expand-item-label">Installed</div><div class="expand-item-value">${r.installed}</div></div>
          <div class="expand-item"><div class="expand-item-label">Total Material</div><div class="expand-item-value">${r.totalMaterial.toLocaleString()}</div></div>
          <div class="expand-item"><div class="expand-item-label">QR Attempts</div><div class="expand-item-value">${r.qrAttempts.toLocaleString()}</div></div>
          <div class="expand-item"><div class="expand-item-label">Consumers</div><div class="expand-item-value">${r.consumers.toLocaleString()}</div></div>
          <div class="expand-item"><div class="expand-item-label">Tickets Open</div><div class="expand-item-value">${r.tickets}</div></div>
        </div>
      </td></tr>
    ` : ''}
  `).join('');

  // Pager
  const ctrls = document.getElementById('cp-pager-ctrls');
  const info = document.getElementById('cp-pager-info');
  info.innerHTML = `Showing <strong style="color:var(--text);font-family:var(--font-mono);">${start + 1}–${Math.min(start + pageSize, total)}</strong> of <strong style="color:var(--text);font-family:var(--font-mono);">${total}</strong>`;

  const pageBtns = [];
  pageBtns.push(`<button class="pg-btn" ${masterState.page === 1 ? 'disabled' : ''} data-pg="prev">‹</button>`);
  const maxBtn = Math.min(pages, 7);
  let startBtn = Math.max(1, masterState.page - 3);
  if (startBtn + maxBtn - 1 > pages) startBtn = Math.max(1, pages - maxBtn + 1);
  for (let p = startBtn; p < startBtn + maxBtn && p <= pages; p++) {
    pageBtns.push(`<button class="pg-btn ${p === masterState.page ? 'active' : ''}" data-pg="${p}">${p}</button>`);
  }
  pageBtns.push(`<button class="pg-btn" ${masterState.page === pages ? 'disabled' : ''} data-pg="next">›</button>`);
  ctrls.innerHTML = pageBtns.join('');

  // Wire up events
  ctrls.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      if (b.dataset.pg === 'prev') masterState.page--;
      else if (b.dataset.pg === 'next') masterState.page++;
      else masterState.page = +b.dataset.pg;
      renderCpTable();
    });
  });

  tbody.querySelectorAll('.expand-toggle').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el.dataset.cp;
      if (masterState.expanded.has(id)) masterState.expanded.delete(id);
      else masterState.expanded.add(id);
      renderCpTable();
    });
  });

  tbody.querySelectorAll('.open-detail').forEach(el => {
    el.addEventListener('click', () => openCpDetail(el.dataset.cp));
  });

  tbody.querySelectorAll('tr[data-cp]').forEach(tr => {
    tr.addEventListener('dblclick', () => openCpDetail(tr.dataset.cp));
  });
}

function wireCpMasterControls() {
  document.getElementById('cp-search').addEventListener('input', (e) => { masterState.search = e.target.value; masterState.page = 1; renderCpTable(); });
  document.getElementById('cp-f-type').addEventListener('change', (e) => { masterState.filterType = e.target.value; masterState.page = 1; renderCpTable(); });
  document.getElementById('cp-f-block').addEventListener('change', (e) => { masterState.filterBlock = e.target.value; masterState.page = 1; renderCpTable(); });
  document.getElementById('cp-f-vendor').addEventListener('change', (e) => { masterState.filterVendor = e.target.value; masterState.page = 1; renderCpTable(); });
  document.getElementById('cp-f-status').addEventListener('change', (e) => { masterState.filterStatus = e.target.value; masterState.page = 1; renderCpTable(); });
  document.getElementById('cp-f-retype').addEventListener('change', (e) => { masterState.filterReType = e.target.value; masterState.page = 1; renderCpTable(); });
  document.getElementById('cp-f-action').addEventListener('change', (e) => { masterState.filterAction = e.target.value; masterState.page = 1; renderCpTable(); });

  document.querySelectorAll('#cp-table thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.sort;
      if (masterState.sortKey === k) masterState.sortDir = masterState.sortDir === 'asc' ? 'desc' : 'asc';
      else { masterState.sortKey = k; masterState.sortDir = 'asc'; }
      renderCpTable();
    });
  });
}

function openCpDetail(cpId) {
  const cp = CP_DATA.find(c => c.id === cpId);
  if (!cp) return;
  document.getElementById('crumb-page').textContent = `Collection Points · ${cp.id} · ${cp.name}`;
  document.getElementById('main-content').innerHTML = pageCpDetail(cp);
  document.getElementById('main-content').scrollTop = 0;
  document.getElementById('back-to-master').addEventListener('click', () => navigateTo('cp-overall', 'cp', 'Overall View'));
}

  const returning = DRIVER_FLEET.filter(d => d.status === 'returning');
  const untrippedCPs = CP_DATA.filter(c => c.sealedBags > 0 && !c.hasTrip).length;
  const canCover = avail.length >= untrippedCPs;
  const sealTripSLA = SLA_MODEL.find(s => s.id === 'seal_trip');
  const tripPickupSLA = SLA_MODEL.find(s => s.id === 'trip_pickup');

  let coverageMsg, coverageColor;
  if (untrippedCPs === 0) { coverageMsg = 'All CPs with sealed bags have trips assigned.'; coverageColor = 'good'; }
  else if (canCover) { coverageMsg = `${avail.length} available driver${avail.length>1?'s':''} can cover ${untrippedCPs} untripped CP${untrippedCPs>1?'s':''}. Assign now.`; coverageColor = 'info'; }
  else { coverageMsg = `Only ${avail.length} driver${avail.length!==1?'s':''} available but ${untrippedCPs} CPs need trips. ${returning.length} returning soon — reassign when back.`; coverageColor = 'warn'; }

  return `
    <div class="section-head"><div class="section-title">Logistics Performance</div><div class="section-sub">${m.label.date}${m.label.cluster && m.label.cluster !== 'All' ? ' · '+m.label.cluster : ''}</div></div>

      ${kpi('Vehicle Utilisation', '78', '%', { delta: 3 })}
    </div>

    <!-- Driver Coverage Verdict -->
    <div class="card" style="margin-top: 16px; padding: 14px 18px; border-left: 4px solid var(--${coverageColor==='good'?'good':coverageColor==='info'?'accent':'warn'});">
      <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;">
        <div>
          <div style="font-size: 11.5px; font-weight: 700; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;">Driver Coverage</div>
          <div style="font-size: 13.5px; color: var(--text); font-weight: 500;">${coverageMsg}</div>

const DATE_OPTIONS = ['Today', 'Last 7d', 'Last 30d', 'Last 90d', 'This Quarter', 'YTD', 'Custom'];
let currentModuleId = 'cp';
let currentPageId = 'exec-home';
let currentDateFilter = 'Today';

function renderFilterBar(moduleId) {
  currentModuleId = moduleId;
  const bar = document.getElementById('filter-bar');
  const filters = MODULE_FILTERS[moduleId] || [];

  // Executive Dashboard renders its own quick-filter bar inline — hide the global one
  if (moduleId === 'exec') {
    bar.innerHTML = '';
    bar.style.display = 'none';
    return;
  }
  bar.style.display = '';

  // Date filter is universal across modules
  const dateChip = `
    <span class="filter-chip filter-dd active" data-filter="__date">
      <span class="filter-chip-label">Date</span>
      <span class="filter-chip-value">${currentDateFilter}</span>
      <span class="filter-chip-caret">▾</span>
    </span>`;

  const moduleChips = filters.map(f => `
    <span class="filter-chip filter-dd ${f.value !== 'All' ? 'active' : ''}" data-filter="${f.label}">
      <span class="filter-chip-label">${f.label}</span>
      <span class="filter-chip-value">${f.value}</span>
      <span class="filter-chip-caret">▾</span>
    </span>`).join('');

  bar.innerHTML = `
    ${dateChip}
    ${moduleChips}
    <div class="filter-spacer"></div>
    <button class="filter-reset" id="filter-reset-btn">Reset</button>
  `;

  // Wire dropdowns
  bar.querySelectorAll('.filter-dd').forEach(chip => {
    chip.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = chip.dataset.filter;
      const opts = key === '__date' ? DATE_OPTIONS : (filters.find(f => f.label === key)?.options || []);
      showFilterMenu(chip, key, opts);
    });
  });

  document.getElementById('filter-reset-btn').addEventListener('click', () => {
    filters.forEach(f => f.value = f.options[0]);
    currentDateFilter = 'Today';
    renderFilterBar(moduleId);
    if (currentPageId) renderPage(currentPageId);
  });
}

function showFilterMenu(anchor, key, opts) {
  // Close any existing menus
  document.querySelectorAll('.filter-menu').forEach(m => m.remove());
  const rect = anchor.getBoundingClientRect();
  const menu = document.createElement('div');
  menu.className = 'filter-menu';
  menu.style.cssText = `
    position: fixed; top: ${rect.bottom + 4}px; left: ${rect.left}px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; box-shadow: 0 4px 16px rgba(13,18,32,0.08);
    z-index: 100; min-width: 160px; max-height: 280px; overflow-y: auto;
    padding: 4px;
  `;
  menu.innerHTML = opts.map(o => `
    <div class="filter-menu-item" data-val="${o}">${o}</div>
  `).join('');
  document.body.appendChild(menu);

  menu.querySelectorAll('.filter-menu-item').forEach(item => {
    item.addEventListener('click', () => {
      const val = item.dataset.val;
      if (key === '__date') {
        currentDateFilter = val;
      } else {
        const f = MODULE_FILTERS[currentModuleId].find(x => x.label === key);
        if (f) f.value = val;
      }
      menu.remove();
      renderFilterBar(currentModuleId);
      // Re-render current page so the numbers reflect the new filter
      if (currentPageId) renderPage(currentPageId);
    });
  });

  setTimeout(() => {
    const close = (e) => { if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', close); } };
    document.addEventListener('click', close);
  }, 0);
}

function genTickets(n) {
  const out = [];
  for (let i = 0; i < n; i++) {
    const status = pick(TICKET_STATUSES);
    const priority = pick(TICKET_PRIORITIES);
    const cp = CP_DATA[rint(0, CP_DATA.length)];
    const ageHr = rint(1, 96);
    const sla = priority === 'P0' ? 4 : priority === 'P1' ? 12 : priority === 'P2' ? 24 : 48;
    out.push({
      id: `TKT-${10001 + i}`,
      created: `${ageHr}h ago`,
      ageHr: ageHr,
      priority: priority,
      status: status,
      channel: pick(TICKET_CHANNELS),
      category: pick(TICKET_CATEGORIES),
      cp: cp.id,
      cpName: cp.name,
      block: cp.block,
      agent: pick(AGENTS),
      sla: sla,
      slaBreached: ageHr > sla && (status !== 'Resolved' && status !== 'Closed'),
      csat: status === 'Resolved' || status === 'Closed' ? rfloat(2.5, 5.0) : null,
    });
  }
  return out;
}

/* ============================================================
   EXECUTIVE DASHBOARD — Front page, summarizes all modules
   ============================================================ */

// Reactive multipliers driven by the filter dropdowns (Date / View / Scope / Block / Cluster / Panchayat).
// All numbers in module pages scale by these so dropdown changes are visible.
const DATE_MULT = { 'Today': 1.0, 'Last 7d': 6.4, 'Last 30d': 28, 'Last 90d': 84, 'This Quarter': 92, 'YTD': 184, 'Custom': 14 };
const VIEW_MULT = { 'Goa': 1.0, 'North Goa': 0.58, 'South Goa': 0.42 };
const SCOPE_MASK = { 'All Modules': { ops: true, fin: true }, 'Operations Only': { ops: true, fin: false }, 'Finance Only': { ops: false, fin: true } };
// Block multipliers (rough population weighting; sum ≈ 1)
const BLOCK_MULT = {
  'Tiswadi': 0.12, 'Bardez': 0.14, 'Pernem': 0.06, 'Bicholim': 0.07, 'Sattari': 0.05,
  'Ponda': 0.11, 'Mormugao': 0.10, 'Salcete': 0.16, 'Quepem': 0.06, 'Canacona': 0.04,
  'Sanguem': 0.05, 'Dharbandora': 0.04
};
// Cluster multipliers (5 CPC clusters + a few legacy cluster names)
const CLUSTER_MULT = {
  'Verna Cluster': 0.22, 'Margao Cluster': 0.26, 'Mapusa Cluster': 0.20,
  'Ponda Cluster': 0.16, 'Bicholim Cluster': 0.10,
  'North Goa': 0.45, 'South Goa': 0.42, 'Central': 0.13, 'Coastal': 0.18, 'North-East': 0.10,
  'Block-wise': 1.0, 'Inland': 0.05
};
// Warehouse Source filter (HoReCa / D2D / Return / MRF / Non-DRS)
const SOURCE_MULT = { 'HoReCa': 0.18, 'D2D': 0.12, 'Return Center': 0.22, 'MRF': 0.08, 'Non-DRS': 0.06 };

/* Universal multiplier resolver — reads current filter state for any module. */
function getMult(moduleId) {
  moduleId = moduleId || currentModuleId;
  const f = MODULE_FILTERS[moduleId] || [];
  const dateVal = currentDateFilter || 'Today';
  const findVal = (label, fallback) => {
    const x = f.find(x => x.label === label);
    return (x && x.value) || fallback;
  };
  const viewVal = findVal('View', 'Goa');
  const scopeVal = findVal('Scope', 'All Modules');
  const blockVal = findVal('Block', 'All');
  const panchVal = findVal('Panchayat', 'All');
  const clusterVal = findVal('Cluster', null) || findVal('CPC Cluster', 'All');
  const cpTypeVal = findVal('CP Type', 'All');
  const handlerVal = findVal('Handler Type', 'All');
  const sourceVal = findVal('Source', 'All');

  // Compose geo multiplier: most specific wins
  let geo = 1.0;
  if (panchVal && panchVal !== 'All') geo = 0.012; // single panchayat
  else if (blockVal && blockVal !== 'All') geo = BLOCK_MULT[blockVal] || 0.08;
  else if (clusterVal && clusterVal !== 'All' && clusterVal !== null) geo = CLUSTER_MULT[clusterVal] || 0.20;
  else if (viewVal && VIEW_MULT[viewVal]) geo = VIEW_MULT[viewVal];

  // CP type narrows volume
  let typeFactor = 1.0;
  if (cpTypeVal === 'RVM') typeFactor = 0.74;
  else if (cpTypeVal === 'Return Center') typeFactor = 0.18;
  else if (cpTypeVal === 'D2D') typeFactor = 0.06;
  else if (cpTypeVal === 'HoReCa') typeFactor = 0.02;

  // Handler filter (CP module)
  let handlerFactor = 1.0;
  if (handlerVal === 'Handler') handlerFactor = 0.62;
  else if (handlerVal === 'Non-Handler') handlerFactor = 0.38;

  // Source filter (Warehouse module)
  let sourceFactor = 1.0;
  if (sourceVal && sourceVal !== 'All' && SOURCE_MULT[sourceVal]) sourceFactor = SOURCE_MULT[sourceVal];

  return {
    date: DATE_MULT[dateVal] || 1,
    view: geo,
    type: typeFactor,
    handler: handlerFactor,
    source: sourceFactor,
    scope: SCOPE_MASK[scopeVal] || SCOPE_MASK['All Modules'],
    label: {
      date: dateVal, view: viewVal, scope: scopeVal,
      block: blockVal, panchayat: panchVal, cluster: clusterVal,
      cpType: cpTypeVal, handler: handlerVal, source: sourceVal
    }
  };
}

/* Back-compat alias for the existing exec code */
function execMult() { return getMult('exec'); }

/* Universal scalers — accept either a multiplier object OR a moduleId string. */
function scaleNum(base, m) {
  if (typeof m === 'string') m = getMult(m);
  if (!m) m = getMult();
  const factor = (m.date || 1) * (m.view || 1) * (m.type || 1) * (m.handler || 1) * (m.source || 1);
  return Math.round(base * factor);
}
function scaleK(base, m) { return scaleNum(base, m).toLocaleString(); }

/* For "count" metrics that shouldn't scale with date (total CPs, fleet size, etc.) */
function scaleCount(base, m, max) {
  if (typeof m === 'string') m = getMult(m);
  if (!m) m = getMult();
  const v = Math.round(base * (m.view || 1) * (m.type || 1) * (m.handler || 1));
  return max ? Math.min(v, max) : v;
}
